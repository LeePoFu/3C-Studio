/* ===== v1.3 Layout Refinement ===== */
.player{
  grid-template-rows:auto 1fr auto;
}
.score-controls-wrap{
  display:grid;
  gap:10px;
}
.player-controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.player-controls .score-btn{
  width:100%;
  min-width:0;
  min-height:76px;
}
.quick-score-row{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
}
.quick-score-row button{
  width:100%;
  min-width:0;
  min-height:52px;
  border:0;
  border-radius:15px;
  background:#e2e8f0;
  color:#0f172a;
  font-size:1.15rem;
  font-weight:950;
}
.yellow .quick-score-row button{
  background:rgba(255,255,255,.76);
}
.quick-score-row button:active,
.score-btn:active,
.control:active{
  transform:scale(.985);
}
.bottom{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
}
.bottom .control{
  width:100%;
  min-width:0;
  min-height:66px;
  border-radius:18px;
  font-size:1.02rem;
}
.bottom .switch{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#111827;
  font-size:1.08rem;
}
.bottom .finish{
  background:#fff;
  color:#b91c1c;
  border:3px solid #b91c1c;
}
.bottom .pause{background:#334155}
.bottom .undo{background:#475569}

@media(max-width:920px){
  .score-btn{min-height:70px!important}
  .quick-score-row button{min-height:48px}
  .bottom .control{min-height:60px;font-size:.95rem}
}
@media(max-width:820px) and (orientation:portrait){
  .bottom{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
}
@media(max-width:620px){
  .quick-score-row{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
  .bottom{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
}


.bottom.white-turn #pauseBtn{order:1}
.bottom.white-turn #switchBtn{order:2}
.bottom.white-turn #undoBtn{order:3}
.bottom.white-turn #finishBtn{order:4}
.bottom.yellow-turn #pauseBtn{order:1}
.bottom.yellow-turn #undoBtn{order:2}
.bottom.yellow-turn #switchBtn{order:3}
.bottom.yellow-turn #finishBtn{order:4}
.sync-status{
  margin-top:18px;
  padding:14px 16px;
  border-radius:16px;
  background:#ecfdf5;
  border:1px solid #a7f3d0;
  color:#065f46;
  font-weight:850;
  line-height:1.55;
}
.sync-status.error{
  background:#fef2f2;
  border-color:#fecaca;
  color:#991b1b;
}

/* ===== 3C Studio v5.1 Unified Design ===== */
:root{
  --bg:#f4f7fb;--panel:#ffffff;--line:#d8e1eb;--text:#0f172a;
  --muted:#64748b;--green:#0f766e;--danger:#dc2626;
}
html,body{background:var(--bg);color:var(--text);-webkit-user-select:none;user-select:none}
.setup{background:linear-gradient(180deg,#e8f7f4 0,#f4f7fb 45%);padding:22px}
.setup-card{
  background:#fff;border:1px solid var(--line);border-radius:24px;padding:26px;
  box-shadow:0 12px 34px rgba(15,23,42,.08)
}
.setup-card h1{color:#115e59}
.setup-card .sub{color:var(--muted)}
.setup-card input,.setup-card select{
  background:#fff;color:#0f172a;border:1px solid #cbd5e1;
  box-shadow:0 1px 2px rgba(15,23,42,.03)
}
.start-btn{background:linear-gradient(135deg,#14b8a6,#0f766e);box-shadow:0 8px 18px rgba(15,118,110,.2)}
.scoreboard{background:#eef3f8}
.topbar{background:linear-gradient(135deg,#0f766e,#115e59);border:0;color:#fff;box-shadow:0 8px 24px rgba(15,118,110,.18)}
.top-label{color:#ccfbf1}
.player{box-shadow:0 10px 26px rgba(15,23,42,.08)}
.player.white{background:#fff}
.player.yellow{background:#fef3c7}
.player.active{border-color:#14b8a6;box-shadow:0 0 0 4px rgba(20,184,166,.14),0 12px 30px rgba(15,23,42,.12)}
.bottom .pause,.bottom .undo{background:#475569}
.bottom .switch{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.bottom .finish{background:#fff;color:#dc2626;border-color:#dc2626}
.result-overlay{background:rgba(15,23,42,.62);backdrop-filter:blur(8px)}
.result-card{border-radius:24px;box-shadow:0 24px 70px rgba(15,23,42,.25)}
.result-title{color:#115e59}
.result-question{text-align:center;font-size:1.1rem;font-weight:900;margin-top:20px}
.result-actions .save-result{background:#0f766e;color:#fff}
.result-actions .discard-result{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
.result-actions button{height:62px;border-radius:18px;font-size:1.05rem}
.sync-status{background:#f0fdfa;border-color:#99f6e4;color:#115e59}
@media(max-width:620px){
  .setup{padding:12px}.setup-card{padding:18px}.form-grid{grid-template-columns:1fr}
}


/* v5.2 phone height optimization */
.setup-card h1{font-size:1.55rem}
.scoreboard{gap:8px;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left))}
.topbar{min-height:54px;padding:7px 12px;border-radius:16px}
.players{gap:8px}
.player{border-radius:20px;padding:11px;border-width:4px}
.ball{width:34px;height:34px}
.player-name{font-size:1.15rem}
.score{font-size:clamp(5rem,15vh,9rem)}
.run-line{margin-top:5px;font-size:.92rem}
.score-btn{min-height:58px;border-radius:15px;font-size:1.6rem}
.control{min-height:50px;border-radius:14px;font-size:.96rem}
.bottom{gap:8px}
@media(max-width:700px){
 .scoreboard{min-height:100dvh}
 .topbar{grid-template-columns:1fr auto 1fr}
 .top-left,.top-right{gap:8px}
 .top-stat:nth-child(n+3){display:none}
 .players{min-height:0}
 .player-header{gap:8px}
 .player-target{font-size:.78rem}
 .score{font-size:clamp(4.4rem,13vh,7rem)}
 .player-controls{gap:7px}
 .score-btn{min-height:52px}
 .control{min-height:46px;padding:6px}
}


/* ===== v5.2.1 unified scoreboard setup ===== */
body{background:#f4f7fb!important;color:#0f172a}
body>header{display:block;background:#0f766e;color:#fff;padding:18px 16px}
body>header .wrap{max-width:960px;margin:auto}
body>header h1{margin:0;font-size:1.4rem}
body>header .sub{margin-top:5px;opacity:.9;font-size:.92rem;color:#fff}
body>nav{display:block}
#setup{display:block;max-width:960px;margin:auto;padding:14px}
.scoreboard-setup-card{padding:24px;border-radius:24px}
.scoreboard-setup-card .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.scoreboard-setup-card label{color:#0f172a}
.scoreboard-setup-card input,.scoreboard-setup-card select{width:100%;height:auto;min-height:52px;background:#fff;color:#0f172a;border:1px solid #cbd5e1;border-radius:14px;padding:12px;text-align:center}
.scoreboard-setup-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.scoreboard-setup-actions .start-btn,.scoreboard-setup-actions .button-link{margin:0;min-height:52px;border-radius:14px;font-size:1rem;display:flex;align-items:center;justify-content:center;background:#0f766e;color:#fff;border:0}
.scoreboard:not(.hidden){position:fixed;inset:0;z-index:100;background:#eef3f8;color:#0f172a}
@media(max-width:700px){.scoreboard-setup-card .form-grid{grid-template-columns:1fr}.scoreboard-setup-card{padding:18px}}


/* ===== v5.2.3 compact duel setup ===== */
.scoreboard-setup-card{max-width:820px;margin:auto}
.scoreboard-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field-half,.field-full{min-width:0}
.field-full{grid-column:1/-1}
.player-name-field{padding:12px;border:1px solid #dbe3ec;border-radius:16px;background:#f8fafc}
.player-name-field label{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.player-ball-dot{width:15px;height:15px;border-radius:50%;display:inline-block;border:1px solid rgba(15,23,42,.25)}
.player-ball-dot.white{background:#fff}.player-ball-dot.yellow{background:#fde047}
.player-name-field input{margin:0}
.player-name-help{margin-top:6px;font-size:.78rem;color:#64748b}
.scoreboard-setup-card input,.scoreboard-setup-card select{width:100%!important;max-width:none!important}
@media(max-width:700px){
  .scoreboard-form-grid{grid-template-columns:1fr 1fr;gap:12px 10px}
  .field-full{grid-column:1/-1}
  .scoreboard-setup-card label{font-size:.9rem}
  .scoreboard-setup-card input,.scoreboard-setup-card select{min-height:48px;padding:10px;font-size:.95rem}
  .player-name-field{padding:10px}
}
@media(max-width:430px){
  .scoreboard-form-grid{grid-template-columns:1fr 1fr;gap:10px 8px}
  .player-name-field{padding:8px}
  .player-name-help{display:none}
}


/* ===== v5.3 browser / standalone unified scoreboard ===== */
.scoreboard:not(.hidden){
  width:100%;height:100dvh;min-height:0;max-width:1800px;margin:0 auto;
  grid-template-rows:auto minmax(0,1fr) auto;overflow:hidden;
}
.players{min-height:0;overflow:hidden}
.player{min-height:0;grid-template-rows:auto minmax(0,1fr) auto}
.score-area{min-height:0;padding:6px 0 10px}
.run-line{margin-top:10px;margin-bottom:8px;line-height:1.25}
.player-controls .score-btn{min-height:60px!important}
.player.white .minus,.player.yellow .minus{background:#cbd5e1!important;color:#0f172a!important}
.player.white .plus,.player.yellow .plus{background:#0f766e!important;color:#fff!important}
@media (orientation:landscape) and (max-height:950px){
  .scoreboard:not(.hidden){gap:7px;padding:max(7px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(7px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left))}
  .topbar{min-height:54px;padding:7px 14px;border-radius:16px}
  .top-label{font-size:.72rem}.top-value{font-size:1.15rem}.title{font-size:1rem}
  .player{padding:10px 14px;border-radius:22px;border-width:4px}
  .player-header{gap:10px}.ball{width:36px;height:36px}.player-name{font-size:1.18rem}
  .score{font-size:clamp(4.7rem,15vh,8rem)}
  .run-line{margin-top:7px;margin-bottom:7px;font-size:.9rem}
  .score-controls-wrap{gap:7px}.player-controls{gap:9px}
  .player-controls .score-btn{min-height:58px!important;font-size:1.65rem;border-radius:15px}
  .quick-score-row{gap:7px}.quick-score-row button{min-height:40px;font-size:1rem;border-radius:12px}
  .bottom{gap:8px}.bottom .control{min-height:52px;font-size:.93rem;border-radius:14px}
}
@media (display-mode:standalone) and (orientation:landscape) and (max-height:950px){
  .scoreboard:not(.hidden){height:100dvh}
}

/* v5.3 hotfix: compact scoring controls */
.player-controls .score-btn{min-height:50px!important;height:50px;font-size:1.42rem!important;border-radius:14px!important}
.quick-score-row button{min-height:38px!important;height:38px;font-size:.98rem!important;border-radius:11px!important}
.score-controls-wrap{gap:8px!important}.player-controls{gap:10px!important}.quick-score-row{gap:7px!important}
@media(max-width:920px){.player-controls .score-btn{min-height:48px!important;height:48px}.quick-score-row button{min-height:36px!important;height:36px}}


/* ===== v5.3 match ending & end-game layout fix ===== */
.score-area{
  min-height:0;
  justify-content:center;
  gap:8px;
  padding:8px 0 14px;
}
.remaining{
  position:static;
  margin:0;
  flex:0 0 auto;
  min-height:42px;
  padding:7px 16px;
  z-index:1;
}
.run-line{margin-top:0;position:relative;z-index:1}
.player.endgame .score{font-size:clamp(6rem,16vh,11rem)}
.player.endgame .score-area{justify-content:center}
.score-controls-wrap{position:relative;z-index:2}
.result-overlay{opacity:0;visibility:hidden;transition:opacity .16s ease}
.result-overlay.visible{opacity:1;visibility:visible}
.result-overlay.hidden{display:none!important}
@media(max-height:760px) and (orientation:landscape){
  .player{padding:14px}
  .score-area{gap:5px;padding:2px 0 8px}
  .score{font-size:clamp(5.5rem,15vh,9.5rem)}
  .player.endgame .score{font-size:clamp(5rem,13vh,8.5rem)}
  .remaining{min-height:36px;padding:5px 13px;font-size:.98rem}
  .run-line{font-size:.95rem}
}


/* ===== v5.3 match modes ===== */
.phase-banner{background:#fff7cc;border:2px solid #f59e0b;color:#7c2d12;border-radius:14px;padding:8px 14px;text-align:center;font-weight:900;font-size:.95rem}
.scoreboard:has(.phase-banner:not(.hidden)){grid-template-rows:auto auto 1fr auto}
.remaining{position:static!important;margin:4px 0 2px;padding:5px 14px!important;font-size:1rem!important;line-height:1.2}
.player.endgame .score-area{gap:4px!important}
@media(max-width:700px){.phase-banner{font-size:.82rem;padding:6px 10px}.remaining{font-size:.88rem!important;padding:4px 10px!important}}

<script>
const SCOREBOARD_KEY='threeCushionIPadScoreboardHistory_v1';
const RECORDS_KEY='threeCushionTrainingLog_v1';
let latestRecordsGame=null;
let pendingRecord=null;
let state=null;
let timer=null;
let undoStack=[];
let finishing=false;

function blankPlayer(name,start){
  return{name,startScore:start,score:start,run:0,turns:0,runs:[],highRun:0,zeroTurns:0,scoringTurns:0};
}

function syncMatchModeFields(){
  const timed=matchModeInput.value==='timed';
  targetScoreField.classList.toggle('hidden',timed);
  timeLimitField.classList.toggle('hidden',!timed);
  equalInningField.classList.remove('hidden');
}

function startGame(){
  const whitePlayerName=whiteName.value.trim();
  const yellowPlayerName=yellowName.value.trim();
  if(!whitePlayerName||!yellowPlayerName)return alert('請輸入或選擇白球與黃球球員姓名。');
  if(whitePlayerName===yellowPlayerName)return alert('白球與黃球球員姓名不可相同。');
  const mode=matchModeInput.value==='timed'?'timed':'target';
  const target=Math.max(1,Number(targetInput.value)||20);
  const timeLimitMinutes=Math.max(1,Number(timeLimitInput.value)||60);
  const now=Date.now();
  state={
    matchId:'scoreboard-'+now+'-'+Math.random().toString(36).slice(2,8),
    mode,target,timeLimitMinutes,timeLimitMs:timeLimitMinutes*60000,
    equalInning:equalInningInput.value==='yes',
    phase:'normal', // normal | equal-inning | overtime | timed-white-finish | timed-equal-inning | timed-sudden-death | finished
    resultReason:'',
    matchDate:matchDate.value,matchTime:matchTime.value,venue:matchVenue.value.trim(),
    matchName:matchName.value.trim(),stake:stakeInput.value.trim(),
    endGameThreshold:Number(endGameThreshold.value)||0,selfSide:selfSideInput.value,
    starter:'white',active:'white',inning:1,startedAt:now,paused:false,pausedAt:0,totalPausedMs:0,
    white:blankPlayer(whitePlayerName,Math.max(0,Number(whiteStart.value)||0)),
    yellow:blankPlayer(yellowPlayerName,Math.max(0,Number(yellowStart.value)||0)),history:[]
  };
  undoStack=[]; finishing=false;
  setup.classList.add('hidden'); scoreboard.classList.remove('hidden');
  clearInterval(timer); timer=setInterval(tick,250); render();
}

function activeElapsedMs(){
  if(!state)return 0;
  const end=state.paused?state.pausedAt:Date.now();
  return Math.max(0,end-state.startedAt-state.totalPausedMs);
}
function remainingMs(){return state?Math.max(0,state.timeLimitMs-activeElapsedMs()):0;}
function fmt(ms){const total=Math.max(0,Math.ceil(ms/1000));return String(Math.floor(total/60)).padStart(2,'0')+':'+String(total%60).padStart(2,'0');}
function snapshotState(){if(!state)return;undoStack.push(JSON.parse(JSON.stringify(state)));if(undoStack.length>30)undoStack.shift();}
function undoLast(){if(!state||state.paused||!undoStack.length||state.phase==='finished')return;finishing=false;state=undoStack.pop();render();}

function tick(){
  if(!state||state.paused||finishing)return render();
  if(state.mode==='timed'&&state.phase==='normal'&&remainingMs()<=0){
    if(state.equalInning){
      // 有後攻：時間到時先讓當前這一杆完成。
      // 若白球正在出杆，白球失誤後黃球再取得最後一次後攻；
      // 若黃球正在出杆，該杆本身就是最後後攻。
      state.phase=state.active==='white'?'timed-white-finish':'timed-equal-inning';
      state.resultReason='時間到，等待後攻完成';
    }else if(state.white.score===state.yellow.score){
      state.phase='timed-sudden-death';
      state.resultReason='時間到平手，進入驟死延長';
    }else{
      state.resultReason='限時結束';
      return finishGame(true);
    }
  }
  render();
}

function changeScore(side,delta){
  if(!state||state.paused||state.active!==side||state.phase==='finished')return;
  finishing=false;
  snapshotState();
  const p=state[side];
  const nextRun=Math.max(0,p.run+delta),actualDelta=nextRun-p.run;
  p.run=nextRun;p.score=Math.max(p.startScore,p.score+actualDelta);

  if(state.mode==='target'&&state.phase==='normal'&&p.score>=state.target){
    if(!state.equalInning){state.resultReason='到達目標分數';render();return finishGame(true);}
    if(side==='yellow'){
      // 黃球在一般輪次達標時，仍可完成本杆，按下換人後再判定。
      state.phase='yellow-at-target';
    }else{
      // 白球到分後仍可繼續本杆，直到按下換人。
      state.phase='leader-at-target';
    }
  }
  // 黃球後攻即使達標或超越，也只更新分數；不鎖畫面、不提前結束。
  // 必須由使用者按下「換我」完成本杆，再進行勝負判定。
  if(state.mode==='target'&&state.equalInning&&side==='yellow'&&state.phase==='equal-inning'){
    finishing=false;
  }
  render();
}

function commitRun(side){
  const p=state[side];
  p.turns+=1;p.runs.push(p.run);p.highRun=Math.max(p.highRun,p.run);
  if(p.run===0)p.zeroTurns+=1;else p.scoringTurns+=1;
  state.history.push({inning:state.inning,player:side,playerName:p.name,run:p.run,cumulative:p.score,elapsedSeconds:Math.round(activeElapsedMs()/1000),phase:state.phase});
  p.run=0;
}

function switchPlayer(){
  if(!state||state.paused||state.phase==='finished'||finishing)return;
  finishing=false;
  snapshotState();
  const side=state.active;
  commitRun(side);

  // 目標分數＋後攻：只有在「一杆結束（按換人）」時判定勝負。
  if(state.mode==='target'&&state.equalInning){
    // 白球先達標：白球本杆結束後，黃球取得最後後攻。
    if(side==='white'&&(state.phase==='leader-at-target'||state.white.score>=state.target)){
      state.phase='equal-inning';
      state.active='yellow';
      render();
      return;
    }

    // 黃球在一般輪次先達標：完成本杆後直接依雙方分數判定；平手進延長。
    if(side==='yellow'&&state.phase==='yellow-at-target'){
      return resolveCompletedYellowTurn('黃球達標並領先','達標後平手，進入延長賽');
    }

    // 黃球最後後攻完成：領先黃勝、落後白勝、平手延長。
    if(side==='yellow'&&state.phase==='equal-inning'){
      return resolveCompletedYellowTurn('黃球後攻超越','後攻結束仍平手，進入延長賽');
    }

    // 延長賽須等黃球完成同一輪後才判定。
    if(state.phase==='overtime'&&side==='yellow'){
      if(state.white.score!==state.yellow.score){
        state.resultReason='延長賽決勝';
        queueFinishGame();
        return;
      }
      state.inning+=1;
      state.active='white';
      render();
      return;
    }
  }

  if(state.mode==='timed'&&state.equalInning){
    if(state.phase==='timed-white-finish'&&side==='white'){
      state.phase='timed-equal-inning';
      state.active='yellow';
      render();
      return;
    }
    if(state.phase==='timed-equal-inning'&&side==='yellow'){
      if(state.white.score===state.yellow.score){
        state.phase='timed-sudden-death';
        state.resultReason='限時後攻結束仍平手，進入驟死延長';
        state.inning+=1;
        state.active='white';
        render();
        return;
      }
      state.resultReason=state.yellow.score>state.white.score?'限時後攻逆轉':'限時後攻結束，白球領先';
      queueFinishGame();
      return;
    }
  }

  if(state.mode==='timed'&&state.phase==='timed-sudden-death'&&side==='yellow'&&state.white.score!==state.yellow.score){
    state.resultReason='限時平手後驟死決勝';
    queueFinishGame();
    return;
  }

  const next=side==='white'?'yellow':'white';
  state.active=next;
  if(next===state.starter)state.inning+=1;
  render();
}

function resolveCompletedYellowTurn(winReason,tieReason){
  if(state.yellow.score>state.white.score){
    state.resultReason=winReason;
    queueFinishGame();
    return;
  }
  if(state.yellow.score<state.white.score){
    state.resultReason='後攻結束，白球領先';
    queueFinishGame();
    return;
  }
  state.phase='overtime';
  state.resultReason=tieReason;
  state.inning+=1;
  state.active='white';
  render();
}

function togglePause(){if(!state||state.phase==='finished')return;finishing=false;snapshotState();if(!state.paused){state.paused=true;state.pausedAt=Date.now();}else{state.totalPausedMs+=Date.now()-state.pausedAt;state.paused=false;state.pausedAt=0;}render();}
function playerStats(p){const earned=p.score-p.startScore,avg=p.turns?earned/p.turns:0;return{earned,avg,scoringRate:p.turns?p.scoringTurns/p.turns:0,zeroRate:p.turns?p.zeroTurns/p.turns:0};}
function buildScoreboardRecord(){
  const w=playerStats(state.white),y=playerStats(state.yellow);
  return{id:state.matchId,date:state.matchDate||new Date().toISOString().slice(0,10),time:state.matchTime||'',venue:state.venue||'',matchName:state.matchName||'',stake:state.stake||'',mode:state.mode,target:state.mode==='target'?state.target:null,timeLimitMinutes:state.mode==='timed'?state.timeLimitMinutes:null,equalInning:state.equalInning,phase:state.phase,resultReason:state.resultReason,durationSeconds:Math.round(activeElapsedMs()/1000),totalPausedSeconds:Math.round(state.totalPausedMs/1000),inning:state.inning,starter:state.starter,selfSide:state.selfSide,white:{...state.white,...w},yellow:{...state.yellow,...y},history:state.history};
}
function participantForRecords(side,role,record){const p=record[side];return{name:role==='self'?'我':p.name,displayName:p.name,role,startingScore:Number(p.startScore||0),earnedPoints:Number(p.earned||0),totalPoints:Number(p.score||0),totalShots:Number(p.turns||0),highRun:Number(p.highRun||0),avg:Number(p.avg||0),scores:(p.runs||[]).map((points,index)=>({inn:index+1,points:Number(points||0),playerName:role==='self'?'我':p.name,elapsedSeconds:null,inningTimeSeconds:null,shotTimeSeconds:null}))};}
function buildRecordsGame(record){
  const selfSide=state.selfSide;if(selfSide==='none')return null;
  const opponentSide=selfSide==='white'?'yellow':'white',self=record[selfSide],opponent=record[opponentSide];
  const selfParticipant=participantForRecords(selfSide,'self',record),opponentParticipant=participantForRecords(opponentSide,'opponent',record);
  return{id:state.matchId,externalMatchId:state.matchId,source:'ipad-scoreboard',sourceVersion:'5.3.8',importedFromScoreboard:true,date:record.date||new Date().toISOString().slice(0,10),time:record.time||'',venue:record.venue||'',createdAt:new Date().toISOString(),activityType:'對戰',inputMode:'run-total',targetScore:record.target||0,totalGameSeconds:record.durationSeconds,durationSeconds:record.durationSeconds,totalPausedSeconds:record.totalPausedSeconds,targetCompleted:record.mode==='target'&&(self.score>=record.target||opponent.score>=record.target),activityMeta:{matchName:record.matchName||'',competitionName:record.matchName||'',venue:record.venue||'',stakeAmount:record.stake||'',selfName:'我',selfDisplayName:self.name,opponentName:opponent.name,starterName:state.starter===selfSide?'我':opponent.name,selfStartingScore:Number(self.startScore||0),opponentStartingScore:Number(opponent.startScore||0),matchMode:record.mode,equalInning:record.equalInning,timeLimitMinutes:record.timeLimitMinutes,resultReason:record.resultReason},participants:[selfParticipant,opponentParticipant],duelResult:{selfStartingScore:Number(self.startScore||0),opponentStartingScore:Number(opponent.startScore||0),selfEarnedPoints:Number(self.earned||0),opponentEarnedPoints:Number(opponent.earned||0),selfScore:Number(self.score||0),opponentScore:Number(opponent.score||0),outcome:self.score>opponent.score?'勝':self.score<opponent.score?'敗':'和'},totalPoints:selfParticipant.earnedPoints,totalShots:selfParticipant.totalShots,avg:selfParticipant.avg,highRun:selfParticipant.highRun,scores:selfParticipant.scores,actionTimingEvents:[]};
}
function syncToRecords(record){const game=buildRecordsGame(record);if(!game)return{synced:false,message:'未指定我方，因此只保存 Scoreboard 紀錄。'};let games=[];try{games=JSON.parse(localStorage.getItem(RECORDS_KEY)||'[]')}catch{}if(!Array.isArray(games))games=[];if(games.some(item=>item?.externalMatchId===game.externalMatchId||item?.id===game.externalMatchId))return{synced:false,message:'此比賽已存在於 Training Records，未重複同步。'};games.push(game);localStorage.setItem(RECORDS_KEY,JSON.stringify(games));return{synced:true,message:'已直接存入 Records。'};}
function finalizeActiveRun(){if(!state||state.finalized)return;const p=state[state.active];if(p.run>0)commitRun(state.active);state.finalized=true;}
function populateScoreFavoritePlayers(players){const select=document.getElementById('favoriteOpponentSelect');if(!select)return;select.innerHTML='<option value="">請選擇常用球員</option>'+players.map(name=>`<option value="${escapeScoreText(name)}">${escapeScoreText(name)}</option>`).join('');}

function queueFinishGame(){
  // Finish after the current tap/click handler returns. This avoids an iOS WebKit
  // state where the backdrop is painted before the summary card and intercepts all taps.
  window.setTimeout(()=>finishGame(true),0);
}

function openResultOverlay(){
  // Render the summary as a normal document section rather than a fixed modal.
  // iOS PWA can leave a fixed transparent backdrop above the page after a tap.
  scoreboard.classList.add('hidden');
  resultOverlay.classList.remove('hidden','open','visible');
  resultOverlay.classList.add('page-result');
  resultOverlay.style.removeProperty('display');
  resultOverlay.style.removeProperty('opacity');
  resultOverlay.style.removeProperty('visibility');
  resultOverlay.style.removeProperty('pointer-events');
  resultOverlay.setAttribute('aria-hidden','false');
  document.body.style.overflow='';
  window.scrollTo({top:0,behavior:'auto'});
  void resultOverlay.offsetHeight;
  return !resultOverlay.classList.contains('hidden') && resultOverlay.getBoundingClientRect().height>0;
}

function finishGame(auto=false){
  if(!state||state.phase==='finished'||finishing)return;
  if(!auto&&!window.confirm('確定要結束這場比賽並查看摘要嗎？'))return;

  finishing=true;
  try{
    finalizeActiveRun();
    clearInterval(timer);
    if(!state.resultReason)state.resultReason=auto?'規則判定結束':'手動結束';

    // 先建立摘要內容；任何同步欄位失敗都不能阻止摘要顯示。
    let record;
    try{record=buildScoreboardRecord();}
    catch(recordError){
      console.warn('buildScoreboardRecord failed',recordError);
      record={
        id:state.matchId,date:state.matchDate,time:state.matchTime,venue:state.venue,
        matchName:state.matchName,stake:state.stake,mode:state.mode,target:state.target,
        timeLimitMinutes:state.timeLimitMinutes,equalInning:state.equalInning,
        resultReason:state.resultReason,durationSeconds:Math.round(activeElapsedMs()/1000),
        white:JSON.parse(JSON.stringify(state.white)),yellow:JSON.parse(JSON.stringify(state.yellow))
      };
    }
    pendingRecord=record;
    try{latestRecordsGame=buildRecordsGame(record);}catch(syncBuildError){latestRecordsGame=null;console.warn(syncBuildError);}

    const whiteStats=playerStats(state.white);
    const yellowStats=playerStats(state.yellow);
    const winner=state.white.score===state.yellow.score?'和局':state.white.score>state.yellow.score?state.white.name:state.yellow.name;
    resultScore.textContent=`${state.white.score} ： ${state.yellow.score}｜${winner==='和局'?'和局':winner+' 勝'}`;
    statsGrid.innerHTML=statHTML(state.white,whiteStats,'white')+statHTML(state.yellow,yellowStats,'yellow');
    const modeText=state.mode==='timed'?`限時驟死賽 ${state.timeLimitMinutes} 分鐘／${state.equalInning?'有後攻':'無後攻'}`:`目標 ${state.target} 分／${state.equalInning?'有後攻':'無後攻'}`;
    syncStatus.classList.remove('hidden','error');
    syncStatus.innerHTML=`${escapeScoreText(modeText)}<br>${escapeScoreText(state.resultReason)}<br>本場用時 <strong>${fmt((record.durationSeconds||0)*1000)}</strong>${record.matchName?`<br>活動：${escapeScoreText(record.matchName)}`:''}${record.stake?`<br>賭注：${escapeScoreText(record.stake)}`:''}`;

    // Only finish the match after the summary layer is measurably visible.
    const overlayOpened=openResultOverlay();
    if(!overlayOpened)throw new Error('摘要視窗未成功顯示');
    state.phase='finished';
  }catch(error){
    console.error(error);
    // 發生錯誤時恢復可操作狀態，不留下鎖定頁面。
    if(state&&state.phase==='finished')state.phase='normal';
    resultOverlay.classList.remove('open','visible','page-result');
    resultOverlay.classList.add('hidden');
    scoreboard.classList.remove('hidden');
    resultOverlay.style.display='none';
    resultOverlay.setAttribute('aria-hidden','true');
    document.body.style.overflow='';
    alert('無法開啟比賽摘要。錯誤：'+(error&&error.message?error.message:error));
  }finally{
    finishing=false;
  }
}

function escapeScoreText(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function saveResult(){if(!pendingRecord)return;let saved=[];try{saved=JSON.parse(localStorage.getItem(SCOREBOARD_KEY)||'[]')}catch{}if(!Array.isArray(saved))saved=[];if(!saved.some(item=>item.id===pendingRecord.id)){saved.push(pendingRecord);localStorage.setItem(SCOREBOARD_KEY,JSON.stringify(saved));}const result=syncToRecords(pendingRecord);pendingRecord=null;alert(result.synced?'已保留並存入歷史紀錄。':result.message);location.href='history.html';}
function discardResult(){if(!confirm('確定不保留本場紀錄？此動作無法復原。'))return;pendingRecord=null;newGame();}
function statHTML(p,s,side){return `<div class="stat-panel ${side==='yellow'?'yellow-stat':''}"><div class="stat-name">${escapeScoreText(p.name)}</div><div class="stat-row"><span>最終分數</span><strong>${p.score}</strong></div><div class="stat-row"><span>實際得分</span><strong>${s.earned}</strong></div><div class="stat-row"><span>出杆次數</span><strong>${p.turns}</strong></div><div class="stat-row"><span>AVG</span><strong>${s.avg.toFixed(3)}</strong></div><div class="stat-row"><span>High Run</span><strong>${p.highRun}</strong></div><div class="stat-row"><span>得分率</span><strong>${(s.scoringRate*100).toFixed(1)}%</strong></div><div class="stat-row"><span>0分率</span><strong>${(s.zeroRate*100).toFixed(1)}%</strong></div></div>`;}

function render(){
  if(!state)return;
  const timed=state.mode==='timed';
  timeLabel.textContent=timed?'剩餘時間':'經過時間';
  elapsed.textContent=timed?(state.phase==='normal'?fmt(remainingMs()):'00:00'):fmt(activeElapsedMs());
  inning.textContent=state.inning;goalLabel.textContent=timed?'對戰模式':'目標分數';targetDisplay.textContent=timed?'限時':state.target;activeName.textContent=state[state.active].name;
  whiteNameDisplay.textContent=state.white.name;yellowNameDisplay.textContent=state.yellow.name;
  whiteTarget.textContent=timed?'限時':state.target;yellowTarget.textContent=timed?'限時':state.target;
  whiteScore.textContent=state.white.score;yellowScore.textContent=state.yellow.score;whiteRun.textContent=state.white.run;yellowRun.textContent=state.yellow.run;
  whiteHighRun.textContent=Math.max(state.white.highRun,state.white.run);yellowHighRun.textContent=Math.max(state.yellow.highRun,state.yellow.run);
  const threshold=Number(state.endGameThreshold)||0;
  const whiteLeft=timed?0:Math.max(0,state.target-state.white.score),yellowLeft=timed?0:Math.max(0,state.target-state.yellow.score);
  const showWhite=!timed&&(threshold===999||(threshold>0&&whiteLeft>0&&whiteLeft<=threshold));
  const showYellow=!timed&&(threshold===999||(threshold>0&&yellowLeft>0&&yellowLeft<=threshold));
  whiteRemaining.textContent='剩 '+whiteLeft;yellowRemaining.textContent='剩 '+yellowLeft;
  whiteRemaining.classList.toggle('hidden',!showWhite);yellowRemaining.classList.toggle('hidden',!showYellow);
  whitePanel.classList.toggle('endgame',showWhite);yellowPanel.classList.toggle('endgame',showYellow);
  whitePanel.classList.toggle('active',state.active==='white');yellowPanel.classList.toggle('active',state.active==='yellow');whiteActive.classList.toggle('hidden',state.active!=='white');yellowActive.classList.toggle('hidden',state.active!=='yellow');
  let phaseText='';
  if(state.phase==='yellow-at-target')phaseText=`${state.yellow.name} 已達標，本杆結束後判定勝負`;
  if(state.phase==='leader-at-target')phaseText=`${state.white.name} 已達標，失誤後由黃球進行最後後攻`;
  if(state.phase==='equal-inning')phaseText=`後攻中：${state.yellow.name} 最後一次機會`;
  if(state.phase==='overtime')phaseText='平手，進入延長賽（每輪結束後判定勝負）';
  if(state.phase==='timed-white-finish')phaseText=`時間到：${state.white.name} 完成本杆後，${state.yellow.name} 仍有最後後攻`;
  if(state.phase==='timed-equal-inning')phaseText=`時間到後攻中：${state.yellow.name} 完成本杆後判定勝負`;
  if(state.phase==='timed-sudden-death')phaseText='時間到且完成後攻仍平手，進入驟死延長賽';
  phaseBanner.textContent=phaseText;phaseBanner.classList.toggle('hidden',!phaseText);
  pauseBtn.textContent=state.paused?'▶ 繼續':'⏸ 暫停';undoBtn.disabled=!undoStack.length||state.paused;undoBtn.style.opacity=undoBtn.disabled?'.45':'1';
  bottomControls.classList.toggle('white-turn',state.active==='white');bottomControls.classList.toggle('yellow-turn',state.active==='yellow');
  const nextSide=state.active==='white'?'yellow':'white';switchBtn.textContent=state.active==='white'?`換 ${state[nextSide].name} →`:`← 換 ${state[nextSide].name}`;
}
function newGame(){clearInterval(timer);resultOverlay.classList.remove('open','visible','page-result');resultOverlay.classList.add('hidden');resultOverlay.style.display='';resultOverlay.setAttribute('aria-hidden','true');document.body.style.overflow='';finishing=false;syncStatus.classList.add('hidden');scoreboard.classList.add('hidden');setup.classList.remove('hidden');state=null;pendingRecord=null;undoStack=[];}

function syncSelfSideFields(){
  const side=selfSideInput.value;
  if(side==='white'){
    whiteName.value='我'; whiteName.readOnly=true;
    yellowName.readOnly=false; if(yellowName.value==='我')yellowName.value='';
  }else if(side==='yellow'){
    yellowName.value='我'; yellowName.readOnly=true;
    whiteName.readOnly=false; if(whiteName.value==='我')whiteName.value='';
  }else{
    whiteName.readOnly=false; yellowName.readOnly=false;
    if(whiteName.value==='我')whiteName.value='';
    if(yellowName.value==='我')yellowName.value='';
  }
}
function applyFavoriteOpponent(){
  const name=favoriteOpponentSelect.value;
  if(!name)return;
  if(selfSideInput.value==='white')yellowName.value=name;
  else if(selfSideInput.value==='yellow')whiteName.value=name;
  else if(!whiteName.value)whiteName.value=name;
  else yellowName.value=name;
}
selfSideInput.addEventListener('change',()=>{syncSelfSideFields();favoriteOpponentSelect.value='';});
favoriteOpponentSelect.addEventListener('change',applyFavoriteOpponent);

(function initializeMatchSetup(){
  try{
    const prefs=JSON.parse(localStorage.getItem('threeCushionPreferences_v1')||'{}');
    targetInput.value=prefs.defaultTarget||20;
    const players=Array.isArray(prefs.favoritePlayers)?prefs.favoritePlayers:[];
    populateScoreFavoritePlayers(players);
    const venues=Array.isArray(prefs.favoriteVenues)?prefs.favoriteVenues:[];if(prefs.defaultVenue)matchVenue.value=prefs.defaultVenue;else if(venues.length)matchVenue.value=venues[0];
  }catch(e){targetInput.value=20}
  const now=new Date();

  matchDate.value=localDate.toISOString().slice(0,10);
  matchTime.value=localDate.toISOString().slice(11,16);
  syncSelfSideFields();
  syncMatchModeFields();
})();
