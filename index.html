<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/style.css?v=5.2.7.1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><title>3C Studio</title></head><body>
<header><div class="wrap"><h1>3C Studio</h1><div class="sub">練習、比賽計分、歷史與分析</div></div></header>
<nav><div class="nav"><a class="active" href="index.html">首頁</a><a href="game.html?mode=practice">個人練習</a><a href="scoreboard.html">對戰</a><a href="game.html?mode=multiplayer">多人追分</a><a href="history.html">歷史</a><a href="analytics.html">分析</a><a href="settings.html">設定</a></div></nav>
<main>
<section class="card dashboard-card">
      <div class="dashboard-hero">
        <div class="hero-main">
          <div class="eyebrow">3C STUDIO DASHBOARD</div>
          <div>累積活動紀錄</div>
          <div class="hero-value" id="totalGames">0</div>
          <div class="hero-caption">所有個人練習、對戰與多人追分紀錄</div>
        </div>
        <div class="hero-side compact-hero-stats">
          <div class="metric"><div class="ml">總 AVG</div><div class="mv" id="overallAvg">0.000</div></div>
          <div class="metric"><div class="ml">High Run</div><div class="mv" id="highRun">0</div></div>
        </div>
      </div>
    </section>
    <section class="card activity-launcher">
      <div class="section-title-row"><div><div class="eyebrow teal">START ACTIVITY</div><h2>開始活動</h2></div></div>
      <div class="activity-icon-row">
        <a class="activity-icon-link practice-icon" href="game.html?mode=practice" aria-label="個人練習">
          <span class="activity-round-icon">◎</span><span>個人練習</span>
        </a>
        <a class="activity-icon-link duel-icon" href="scoreboard.html" aria-label="雙人對戰">
          <span class="activity-round-icon">VS</span><span>雙人對戰</span>
        </a>
        <a class="activity-icon-link multi-icon" href="game.html?mode=multiplayer" aria-label="多人追分">
          <span class="activity-round-icon">多人</span><span>多人追分</span>
        </a>
      </div>
    </section>
<section class="card"><div class="section-title-row"><h2>近期狀態</h2><a class="mini-link" href="analytics.html">查看分析</a></div>
<div class="metrics"><div class="metric"><div class="ml">最近10局 AVG</div><div class="mv" id="recentAvg">0.000</div></div><div class="metric"><div class="ml">平均單次擊球</div><div class="mv" id="singleShotAvg">—</div></div><div class="metric"><div class="ml">0分率</div><div class="mv" id="zeroRate">0.0%</div></div><div class="metric"><div class="ml">對戰勝率</div><div class="mv" id="winRate">0.0%</div></div></div></section>
<section class="card"><h2>近20局 AVG 趨勢</h2><div class="chart-box"><canvas id="avgChart"></canvas></div></section>
<section class="card"><div class="section-title-row"><h2>最近5局</h2><a class="mini-link" href="history.html">全部歷史</a></div><div class="table"><table><thead><tr><th>日期</th><th>類型</th><th>比分/得分</th><th>AVG/結果</th></tr></thead><tbody id="recentTable"></tbody></table></div></section>
</main><script src="js/common.js?v=5.2.7.1"></script><script>
const games=loadHistory(),hs=historyStats(games),ra=runAnalysis(games),rhythm=rhythmAnalysis(games),duel=games.filter(g=>g.duelResult),wins=duel.filter(g=>g.duelResult.outcome==='勝').length;
totalGames.textContent=hs.totalGames;overallAvg.textContent=Number(hs.avg||0).toFixed(3);recentAvg.textContent=Number(hs.recent10Avg||0).toFixed(3);highRun.textContent=hs.highRun;singleShotAvg.textContent=rhythm.count?rhythm.avg.toFixed(1)+'秒':'—';zeroRate.textContent=(ra.zeroRate*100).toFixed(1)+'%';winRate.textContent=(duel.length?wins/duel.length*100:0).toFixed(1)+'%';
const last=games.slice(-20);new Chart(avgChart,{type:'line',data:{labels:last.map((_,i)=>games.length-last.length+i+1),datasets:[{data:last.map(g=>Number(g.avg||0)),tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
recentTable.innerHTML=games.length?games.slice(-5).reverse().map(g=>{const score=g.duelResult?`${g.duelResult.selfScore}－${g.duelResult.opponentScore}`:(g.activityType==='多人追分'?'個別統計':`${g.totalPoints??0}/${g.targetScore||'-'}`);const result=g.duelResult?g.duelResult.outcome:(g.activityType==='多人追分'?'—':Number(g.avg||0).toFixed(3));return `<tr><td>${escapeHTML(g.date||'')}</td><td>${escapeHTML(g.activityType||'')}</td><td>${score}</td><td>${result}</td></tr>`}).join(''):'<tr><td colspan="4">尚無紀錄</td></tr>';
</script></body></html>
